<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f2f5;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .stat-card h3 {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .stat-card p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }

        .progress-bar-container {
            background: #f0f2f5;
            border-radius: 10px;
            height: 6px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 10px;
            background-color: #2c3e50;
            transition: width 0.5s ease;
        }

        .overdue-banner {
            background-color: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 30px;
            display: none;
        }

        .overdue-banner.active {
            display: block;
        }

        .overdue-banner h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #c2410c;
            margin-bottom: 8px;
        }

        .overdue-banner ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .overdue-banner ul li {
            background: #fee2e2;
            color: #dc2626;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filters input,
        .filters select {
            padding: 9px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            background: white;
        }

        .filters input {
            flex: 1;
            min-width: 200px;
        }

        .filters input:focus,
        .filters select:focus {
            outline: none;
            border-color: #2c3e50;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-primary {
            background-color: #2c3e50;
            color: white;
        }

        .btn-primary:hover {
            background-color: #3d5166;
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #d0d0d0;
        }

        .btn-danger {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .btn-danger:hover {
            background-color: #fecaca;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        .applications-table {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #f8f9fa;
            padding: 14px 20px;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
        }

        td {
            padding: 14px 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }

        tr:hover {
            background-color: #fafafa;
        }

        tr.overdue-row {
            background-color: #fff7ed;
        }

        tr.overdue-row:hover {
            background-color: #ffedd5;
        }

        .overdue-tag {
            font-size: 0.7rem;
            color: #c2410c;
            font-weight: 600;
            margin-left: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state p {
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 9px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2c3e50;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-applied {
            background-color: #e8f0fe;
            color: #1a56db;
        }

        .badge-interview {
            background-color: #fef3c7;
            color: #d97706;
        }

        .badge-offer {
            background-color: #d1fae5;
            color: #059669;
        }

        .badge-rejected {
            background-color: #fee2e2;
            color: #dc2626;
        }

        .stat-card.highlight-interview h3 {
            color: #d97706;
        }

        .stat-card.highlight-offer h3 {
            color: #059669;
        }

        .stat-card.highlight-rejected h3 {
            color: #dc2626;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>Job Application Tracker</h1>
    </header>

    <div class="container">

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="stat-total">0</h3>
                <p>Total Applications</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="bar-total" style="width:100%"></div>
                </div>
            </div>
            <div class="stat-card">
                <h3 id="stat-applied">0</h3>
                <p>Applied</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="bar-applied" style="width:0%;background-color:#1a56db"></div>
                </div>
            </div>
            <div class="stat-card highlight-interview">
                <h3 id="stat-interview">0</h3>
                <p>Interviews</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="bar-interview" style="width:0%;background-color:#d97706"></div>
                </div>
            </div>
            <div class="stat-card highlight-offer">
                <h3 id="stat-offer">0</h3>
                <p>Offers</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="bar-offer" style="width:0%;background-color:#059669"></div>
                </div>
            </div>
            <div class="stat-card highlight-rejected">
                <h3 id="stat-rejected">0</h3>
                <p>Rejected</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="bar-rejected" style="width:0%;background-color:#dc2626"></div>
                </div>
            </div>
            <div class="stat-card">
                <h3 id="stat-response-rate">0%</h3>
                <p>Response Rate</p>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="bar-response-rate" style="width:0%;background-color:#059669"></div>
                </div>
            </div>
        </div>

        <div class="overdue-banner" id="overdue-banner">
            <h3>⚠️ Follow ups overdue</h3>
            <ul id="overdue-list"></ul>
        </div>

        <div class="section-header">
            <h2>Applications</h2>
            <button class="btn btn-primary" onclick="openModal()">+ Add Application</button>
        </div>

        <div class="filters">
            <input type="text" id="search-input" placeholder="Search by company or job title..."
                oninput="filterApplications()">
            <select id="filter-status" onchange="filterApplications()">
                <option value="">All Statuses</option>
                <option value="Applied">Applied</option>
                <option value="Interview">Interview</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
            </select>
        </div>

        <div class="applications-table">
            <table>
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Job Title</th>
                        <th>Status</th>
                        <th>Date Applied</th>
                        <th>Follow Up</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="applications-body"></tbody>
            </table>
        </div>

    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Add Application</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Company *</label>
                    <input type="text" id="input-company" placeholder="e.g. Google">
                </div>
                <div class="form-group">
                    <label>Job Title *</label>
                    <input type="text" id="input-job-title" placeholder="e.g. Software Engineer">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="input-status">
                        <option value="Applied">Applied</option>
                        <option value="Interview">Interview</option>
                        <option value="Offer">Offer</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="input-location" placeholder="e.g. London">
                </div>
                <div class="form-group">
                    <label>Salary</label>
                    <input type="text" id="input-salary" placeholder="e.g. £50,000">
                </div>
                <div class="form-group">
                    <label>Date Applied</label>
                    <input type="date" id="input-date-applied">
                </div>
                <div class="form-group">
                    <label>Follow Up Date</label>
                    <input type="date" id="input-follow-up-date">
                </div>
                <div class="form-group">
                    <label>Job URL</label>
                    <input type="text" id="input-job-url" placeholder="e.g. linkedin.com/jobs/...">
                </div>
                <div class="form-group full-width">
                    <label>Notes</label>
                    <textarea id="input-notes" placeholder="Any notes about this application..."></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveApplication()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000';
        let editingId = null;
        let overdueIds = [];
        let allApplications = [];

        function getBadge(status) {
            const map = {
                'Applied': 'badge-applied',
                'Interview': 'badge-interview',
                'Offer': 'badge-offer',
                'Rejected': 'badge-rejected'
            };
            const cls = map[status] || 'badge-applied';
            return `<span class="badge ${cls}">${status}</span>`;
        }

        function filterApplications() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const status = document.getElementById('filter-status').value;

            const filtered = allApplications.filter(app => {
                const matchesSearch = app.company.toLowerCase().includes(search) ||
                    app.job_title.toLowerCase().includes(search);
                const matchesStatus = status === '' || app.status === status;
                return matchesSearch && matchesStatus;
            });

            renderApplications(filtered);
        }

        function renderApplications(data) {
            const tbody = document.getElementById('applications-body');

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>No applications found.</p></div></td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(app => {
                const isOverdue = overdueIds.includes(app.id);
                const overdueTag = isOverdue ? `<span class="overdue-tag">OVERDUE</span>` : '';
                const rowClass = isOverdue ? 'overdue-row' : '';
                return `
                    <tr class="${rowClass}">
                        <td>${app.company}</td>
                        <td>${app.job_title}</td>
                        <td>${getBadge(app.status)}</td>
                        <td>${app.date_applied || '—'}</td>
                        <td>${app.follow_up_date || '—'}${overdueTag}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn btn-secondary btn-sm" onclick='openModal(${JSON.stringify(app)})'>Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteApplication(${app.id})">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function openModal(app = null) {
            editingId = null;
            document.getElementById('modal-title').textContent = 'Add Application';
            clearForm();
            if (app) {
                editingId = app.id;
                document.getElementById('modal-title').textContent = 'Edit Application';
                document.getElementById('input-company').value = app.company || '';
                document.getElementById('input-job-title').value = app.job_title || '';
                document.getElementById('input-status').value = app.status || 'Applied';
                document.getElementById('input-location').value = app.location || '';
                document.getElementById('input-salary').value = app.salary || '';
                document.getElementById('input-date-applied').value = app.date_applied || '';
                document.getElementById('input-follow-up-date').value = app.follow_up_date || '';
                document.getElementById('input-job-url').value = app.job_url || '';
                document.getElementById('input-notes').value = app.notes || '';
            }
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }

        function clearForm() {
            document.getElementById('input-company').value = '';
            document.getElementById('input-job-title').value = '';
            document.getElementById('input-status').value = 'Applied';
            document.getElementById('input-location').value = '';
            document.getElementById('input-salary').value = '';
            document.getElementById('input-date-applied').value = '';
            document.getElementById('input-follow-up-date').value = '';
            document.getElementById('input-job-url').value = '';
            document.getElementById('input-notes').value = '';
        }

        async function saveApplication() {
            const company = document.getElementById('input-company').value.trim();
            const job_title = document.getElementById('input-job-title').value.trim();

            if (!company || !job_title) {
                alert('Company and Job Title are required.');
                return;
            }

            const payload = {
                company,
                job_title,
                status: document.getElementById('input-status').value,
                location: document.getElementById('input-location').value || null,
                salary: document.getElementById('input-salary').value || null,
                date_applied: document.getElementById('input-date-applied').value || null,
                follow_up_date: document.getElementById('input-follow-up-date').value || null,
                job_url: document.getElementById('input-job-url').value || null,
                notes: document.getElementById('input-notes').value || null,
            };

            const url = editingId ? `${API}/applications/${editingId}` : `${API}/applications/`;
            const method = editingId ? 'PUT' : 'POST';

            await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            closeModal();
            await loadOverdue();
            await loadApplications();
            await loadStats();
        }

        async function deleteApplication(id) {
            if (!confirm('Are you sure you want to delete this application?')) return;
            await fetch(`${API}/applications/${id}`, { method: 'DELETE' });
            await loadOverdue();
            await loadApplications();
            await loadStats();
        }

        async function loadOverdue() {
            const res = await fetch(`${API}/applications/overdue`);
            const data = await res.json();
            overdueIds = data.map(app => app.id);
            const banner = document.getElementById('overdue-banner');
            const list = document.getElementById('overdue-list');

            if (data.length === 0) {
                banner.classList.remove('active');
                return;
            }

            banner.classList.add('active');
            list.innerHTML = data.map(app =>
                `<li>${app.company} — ${app.job_title}</li>`
            ).join('');
        }

        async function loadApplications() {
            const res = await fetch(`${API}/applications/`);
            allApplications = await res.json();
            renderApplications(allApplications);
        }

        async function loadStats() {
            const res = await fetch(`${API}/applications/stats`);
            const data = await res.json();
            const total = data.total_applications;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-applied').textContent = data.applied;
            document.getElementById('stat-interview').textContent = data.interview;
            document.getElementById('stat-offer').textContent = data.offer;
            document.getElementById('stat-rejected').textContent = data.rejected;
            document.getElementById('stat-response-rate').textContent = data.response_rate_percent + '%';

            if (total > 0) {
                document.getElementById('bar-applied').style.width = (data.applied / total * 100) + '%';
                document.getElementById('bar-interview').style.width = (data.interview / total * 100) + '%';
                document.getElementById('bar-offer').style.width = (data.offer / total * 100) + '%';
                document.getElementById('bar-rejected').style.width = (data.rejected / total * 100) + '%';
                document.getElementById('bar-response-rate').style.width = data.response_rate_percent + '%';
            }
        }

        async function init() {
            await loadOverdue();
            await loadApplications();
            await loadStats();
        }

        init();
    </script>

</body>

</html>
