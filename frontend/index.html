<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f0f2f5;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .stat-card h3 {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .stat-card p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 5px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-primary {
            background-color: #2c3e50;
            color: white;
        }

        .btn-primary:hover {
            background-color: #3d5166;
        }

        .applications-table {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #f8f9fa;
            padding: 14px 20px;
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
        }

        td {
            padding: 14px 20px;
            border-top: 1px solid #f0f0f0;
            font-size: 0.9rem;
        }

        tr:hover {
            background-color: #fafafa;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state p {
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>Job Application Tracker</h1>
    </header>

    <div class="container">

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="stat-total">0</h3>
                <p>Total Applications</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-applied">0</h3>
                <p>Applied</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-interview">0</h3>
                <p>Interviews</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-offer">0</h3>
                <p>Offers</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-rejected">0</h3>
                <p>Rejected</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-response-rate">0%</h3>
                <p>Response Rate</p>
            </div>
        </div>

        <div class="section-header">
            <h2>Applications</h2>
            <button class="btn btn-primary">+ Add Application</button>
        </div>

        <div class="applications-table">
            <table>
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Job Title</th>
                        <th>Status</th>
                        <th>Date Applied</th>
                        <th>Follow Up</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="applications-body">
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <p>No applications yet. Add your first one!</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</body>

</html>
